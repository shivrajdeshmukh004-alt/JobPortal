{% extends 'base.html' %}
{% load static %}

{% block title %}Forgot Password - RecruitAI{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/components.css' %}">
<style>
    .auth-card {
        max-width: 450px;
        margin: 5rem auto;
        padding: 3rem;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    }

    .auth-icon {
        width: 64px;
        height: 64px;
        background: #fff5f0;
        color: #E87461;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        margin: 0 auto 1.5rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-card">
        <div class="auth-icon">
            <i class="bi bi-key"></i>
        </div>
        <h2 class="text-center mb-2">Forgot Password?</h2>
        <p class="text-muted text-center mb-4">No worries! Enter your email and we'll send you an OTP to reset it.</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group mb-4">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control form-control-lg"
                    placeholder="Enter your registered email" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">Send OTP</button>
                <a href="{% url 'login' %}" class="btn btn-link">Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
