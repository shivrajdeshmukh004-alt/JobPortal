{% extends 'base.html' %}

{% block title %}No Role Assigned{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 text-center">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 4rem;"></i>
                    </div>
                    <h2 class="fw-bold mb-3">Account Setup Incomplete</h2>
                    <p class="text-muted mb-4">
                        Your account exists but doesn't have a role assigned.
                        Please contact the administrator to assign you either an HR or Candidate role.
                    </p>
                    <a href="{% url 'logout' %}" class="btn btn-primary">
                        <i class="bi bi-box-arrow-right me-2"></i>Logout
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
