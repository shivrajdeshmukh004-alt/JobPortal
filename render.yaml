services:
  - type: web
    name: django-portal
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py create_superuser
    startCommand: gunicorn portal.wsgi --log-file -
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: portal-redis
          property: connectionString

  - type: worker
    name: django-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A portal worker -l info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: portal-redis
          property: connectionString
